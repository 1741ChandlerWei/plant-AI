<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三一學院</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1c1c14; --paper: #f4efe4; --fog: #ebe5d6;
  --border: #c8bfa8; --moss: #3d5c2e; --moss-l: #6a8f52;
}
body { font-family: 'Noto Serif TC', serif; background: var(--paper); color: var(--ink); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
.header { padding: 10px 20px; border-bottom: 2px solid var(--ink); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.header h1 { font-size: 1rem; font-weight: 900; letter-spacing: .1em; }
.header p { font-family: 'DM Mono', monospace; font-size: .55rem; color: var(--moss); letter-spacing: .12em; margin-top: 1px; }
.header-right { text-align: right; }
#sessionBadge { font-family: 'DM Mono', monospace; font-size: .55rem; color: var(--border); }
#memoryBadge { font-family: 'DM Mono', monospace; font-size: .52rem; color: var(--moss-l); margin-top: 2px; }

/* Tabs */
.tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--fog); }
.tab { padding: 8px 20px; font-family: 'DM Mono', monospace; font-size: .65rem; letter-spacing: .08em; cursor: pointer; border-right: 1px solid var(--border); transition: background .15s; color: #888; }
.tab.active { background: var(--paper); color: var(--ink); font-weight: 500; }
.tab:hover:not(.active) { background: #e4dece; }

/* Members */
.members { display: flex; border-bottom: 1px solid var(--border); background: var(--fog); flex-shrink: 0; overflow-x: auto; }
.chip { display: flex; align-items: center; gap: 5px; padding: 7px 12px; border-right: 1px solid var(--border); white-space: nowrap; transition: background .2s; }
.chip.on { background: #fff; }
.chip .dot { width: 6px; height: 6px; border-radius: 50%; }
.chip .rl { font-size: .68rem; font-weight: 700; }

/* Panel */
.panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.panel.active { display: flex; }

/* Feed */
.feed { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 2px; }
.feed::-webkit-scrollbar { width: 3px; } .feed::-webkit-scrollbar-thumb { background: var(--border); }
.empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; opacity: .35; }
.empty div:first-child { font-size: 2.2rem; }
.empty div:last-child { font-family: 'DM Mono', monospace; font-size: .62rem; letter-spacing: .1em; }
.divider { display: flex; align-items: center; gap: 10px; padding: 14px 0 6px; opacity: .4; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.divider span { font-family: 'DM Mono', monospace; font-size: .55rem; letter-spacing: .1em; white-space: nowrap; }
.memory-card { border-left: 3px solid var(--moss-l); padding: 10px 14px; background: #f0f5ec; margin: 8px 0; }
.memory-label { font-family: 'DM Mono', monospace; font-size: .52rem; color: var(--moss); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 6px; }
.memory-item { font-size: .75rem; line-height: 1.7; color: #3a3a2a; margin-bottom: 3px; }
.memory-item span { font-weight: 700; color: var(--moss); }
.q-row { display: flex; justify-content: flex-end; padding: 10px 0; }
.q-bubble { background: var(--ink); color: var(--paper); padding: 9px 14px; font-size: .82rem; line-height: 1.6; max-width: 72%; }
.msg-row { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--fog); }
.avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .85rem; flex-shrink: 0; border: 1.5px solid; }
.msg-body { flex: 1; }
.msg-head { display: flex; gap: 6px; align-items: baseline; margin-bottom: 4px; }
.msg-role { font-size: .72rem; font-weight: 700; }
.msg-tag { font-family: 'DM Mono', monospace; font-size: .55rem; color: #999; }
.msg-text { font-size: .82rem; line-height: 1.75; color: #2a2a1c; white-space: pre-wrap; }
.dots { display: flex; gap: 3px; align-items: center; padding: 6px 0; }
.dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--moss-l); animation: blink 1.1s infinite; }
.dots span:nth-child(2) { animation-delay: .18s; }
.dots span:nth-child(3) { animation-delay: .36s; }
.summary { margin: 12px 0 4px; border: 1.5px solid var(--ink); padding: 14px 16px; background: #fff; }
.summary-label { font-family: 'DM Mono', monospace; font-size: .55rem; letter-spacing: .12em; color: var(--moss); text-transform: uppercase; margin-bottom: 8px; }
.summary-text { font-size: .82rem; line-height: 1.8; white-space: pre-wrap; }

/* Input */
.input-area { border-top: 2px solid var(--ink); padding: 12px 20px; background: var(--paper); flex-shrink: 0; }
.input-label { font-family: 'DM Mono', monospace; font-size: .55rem; letter-spacing: .1em; color: var(--moss); margin-bottom: 6px; text-transform: uppercase; }
.input-row { display: flex; gap: 8px; align-items: flex-end; }
textarea { flex: 1; background: #fff; border: 1.5px solid var(--border); padding: 8px 12px; font-family: 'Noto Serif TC', serif; font-size: .82rem; color: var(--ink); resize: none; outline: none; line-height: 1.55; max-height: 90px; transition: border-color .2s; }
textarea:focus { border-color: var(--ink); }
textarea::placeholder { color: #bbb; }
textarea:disabled { opacity: .5; }
button { background: var(--ink); color: var(--paper); border: none; padding: 9px 16px; font-family: 'DM Mono', monospace; font-size: .65rem; letter-spacing: .08em; cursor: pointer; height: 38px; white-space: nowrap; transition: background .2s, opacity .2s; }
button:hover:not(:disabled) { background: var(--moss); }
button:disabled { opacity: .35; cursor: not-allowed; }
.status { font-family: 'DM Mono', monospace; font-size: .55rem; color: var(--moss); letter-spacing: .08em; min-height: 14px; margin-top: 5px; }

/* Issues Panel */
.issues-panel { flex: 1; overflow-y: auto; padding: 20px; }
.issues-panel::-webkit-scrollbar { width: 3px; }
.issues-panel::-webkit-scrollbar-thumb { background: var(--border); }
.issues-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.issues-toolbar h2 { font-size: .88rem; font-weight: 700; letter-spacing: .06em; }
.btn-add { background: var(--ink); color: var(--paper); border: none; padding: 7px 14px; font-family: 'DM Mono', monospace; font-size: .62rem; cursor: pointer; letter-spacing: .08em; }
.btn-add:hover { background: var(--moss); }
.issue-card { border: 1.5px solid var(--border); background: #fff; padding: 14px 16px; margin-bottom: 10px; transition: border-color .15s; }
.issue-card:hover { border-color: var(--ink); }
.issue-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 10px; }
.issue-title { font-size: .88rem; font-weight: 700; line-height: 1.4; flex: 1; }
.issue-badges { display: flex; gap: 5px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.badge { font-family: 'DM Mono', monospace; font-size: .52rem; padding: 2px 7px; letter-spacing: .06em; white-space: nowrap; }
.badge-priority-高 { background: #fde8e0; color: #a84e2a; }
.badge-priority-中 { background: #f5eed8; color: #b8922a; }
.badge-priority-低 { background: #e6f0dc; color: #3d5c2e; }
.badge-progress { background: var(--fog); color: #666; }
.badge-system { background: #dce8f5; color: #2e4a6e; }
.issue-desc { font-size: .78rem; line-height: 1.65; color: #555; margin-bottom: 6px; }
.issue-solution { font-size: .75rem; line-height: 1.6; color: var(--moss); border-left: 2px solid var(--moss-l); padding-left: 10px; margin-top: 6px; }
.issue-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
.issue-date { font-family: 'DM Mono', monospace; font-size: .52rem; color: #bbb; }
.issue-actions { display: flex; gap: 6px; }
.btn-sm { font-family: 'DM Mono', monospace; font-size: .55rem; padding: 3px 10px; border: 1px solid var(--border); background: transparent; cursor: pointer; color: #666; transition: all .15s; }
.btn-sm:hover { border-color: var(--ink); color: var(--ink); }
.btn-sm.done { border-color: var(--moss-l); color: var(--moss); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(28,28,20,.5); display: none; align-items: center; justify-content: center; z-index: 100; }
.modal-overlay.open { display: flex; }
.modal { background: var(--paper); border: 2px solid var(--ink); padding: 24px; width: 90%; max-width: 520px; max-height: 80vh; overflow-y: auto; }
.modal h3 { font-size: .9rem; font-weight: 700; letter-spacing: .08em; margin-bottom: 18px; }
.form-group { margin-bottom: 14px; }
.form-label { font-family: 'DM Mono', monospace; font-size: .58rem; color: var(--moss); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 5px; display: block; }
.form-input, .form-select, .form-textarea { width: 100%; background: #fff; border: 1.5px solid var(--border); padding: 7px 10px; font-family: 'Noto Serif TC', serif; font-size: .82rem; color: var(--ink); outline: none; transition: border-color .2s; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--ink); }
.form-textarea { resize: vertical; min-height: 70px; }
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
.btn-cancel { background: transparent; color: var(--ink); border: 1.5px solid var(--border); padding: 8px 16px; font-family: 'DM Mono', monospace; font-size: .62rem; cursor: pointer; }
.btn-cancel:hover { border-color: var(--ink); }

@keyframes blink { 0%,80%,100% { opacity: .3; transform: scale(1); } 40% { opacity: 1; transform: scale(1.3); } }
</style>
</head>
<body>

<div class="header">
  <div><h1>三一學院</h1><p>根莖葉 · 參謀室</p></div>
  <div class="header-right">
    <div id="sessionBadge">SESSION #0</div>
    <div id="memoryBadge">載入記憶中...</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('board')">🎯 開會</div>
  <div class="tab" onclick="switchTab('issues')">📋 待討議題</div>
</div>

<!-- Board Panel -->
<div class="panel active" id="panel-board">
  <div class="members" id="membersBar"></div>
  <div class="feed" id="feed">
    <div class="empty" id="emptyState"><div>🌿</div><div>提出商業問題，學院開始討論</div></div>
  </div>
  <div class="input-area">
    <div class="input-label">向學院提問</div>
    <div class="input-row">
      <textarea id="qInput" rows="2" placeholder="例：下半年銷售管道策略？鹿角蕨定價如何優化？ArUco 校正方案？" disabled></textarea>
      <button id="sendBtn" onclick="go()" disabled>開會 →</button>
    </div>
    <div class="status" id="status">載入記憶中...</div>
  </div>
</div>

<!-- Issues Panel -->
<div class="panel" id="panel-issues">
  <div class="issues-panel" id="issuesContainer">
    <div class="issues-toolbar">
      <h2>待討議題</h2>
      <button class="btn-add" onclick="openModal()">+ 新增議題</button>
    </div>
    <div id="issuesList"><div class="empty"><div>📋</div><div>尚無議題，新增第一筆</div></div></div>
  </div>
</div>

<!-- Add Issue Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>新增待討議題</h3>
    <div class="form-group">
      <label class="form-label">議題標題 *</label>
      <input class="form-input" id="f-title" placeholder="簡短描述這個問題">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">分類</label>
        <select class="form-select" id="f-category">
          <option>系統開發</option>
          <option>商業決策</option>
          <option>植物研究</option>
          <option>行銷策略</option>
          <option>營運流程</option>
          <option>其他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">優先度</label>
        <select class="form-select" id="f-priority">
          <option>高</option>
          <option selected>中</option>
          <option>低</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">相關系統</label>
        <select class="form-select" id="f-system">
          <option value="">—</option>
          <option>POS</option>
          <option>S System</option>
          <option>三一學院</option>
          <option>Plant Profile</option>
          <option>其他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">進度</label>
        <select class="form-select" id="f-progress">
          <option>未開始</option>
          <option>討論中</option>
          <option>進行中</option>
          <option>完成</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">背景描述</label>
      <textarea class="form-textarea" id="f-desc" placeholder="描述這個問題的背景、觸發原因..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">可能解法 / 想法</label>
      <textarea class="form-textarea" id="f-solution" placeholder="目前有什麼想法或方向..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button onclick="saveIssue()">儲存議題</button>
    </div>
  </div>
</div>

<script>
const SUPA_URL = 'https://edvklxnzhuhmijdwyzrl.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdmtseG56aHVobWlqZHd5enJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2OTE4MTQsImV4cCI6MjA5MzI2NzgxNH0.65Vf-XUlPZmhc-LWqzXq55bpR6RcG8iqNybf_bqyd60';

const MEMBERS = [
  { id:'ceo', role:'執行長', tag:'CEO', emoji:'🎯', color:'#3d5c2e', bg:'#e6f0dc',
    sys:'你是根莖葉植物工作室的執行長。策略思考，關注整體方向與品牌定位。繁體中文，語氣決斷。150字內。' },
  { id:'cmo', role:'行銷長', tag:'CMO', emoji:'📣', color:'#a84e2a', bg:'#f5e4dc',
    sys:'你是根莖葉植物工作室的行銷長。創意導向，關注IG/FB社群與內容策略。繁體中文，語氣熱情。150字內。' },
  { id:'coo', role:'營運長', tag:'COO', emoji:'⚙️', color:'#2e4a6e', bg:'#dce8f5',
    sys:'你是根莖葉植物工作室的營運長。關注執行可行性、流程與人力（員工：Quang、小幫手）。繁體中文，語氣直接。150字內。' },
  { id:'cfo', role:'財務長', tag:'CFO', emoji:'📊', color:'#b8922a', bg:'#f5eed8',
    sys:'你是根莖葉植物工作室的財務長。關注定價、利潤、ROI與財務風險。繁體中文，語氣理性謹慎。150字內。' },
  { id:'cpo', role:'產品長', tag:'CPO', emoji:'🌱', color:'#2a6e5a', bg:'#daf0ea',
    sys:'你是根莖葉植物工作室的產品長，專注鹿角蕨（staghorn fern）與特殊品種。關注產品、品種、顧客體驗。繁體中文，語氣充滿熱情。150字內。' },
  { id:'mech', role:'機械工程師', tag:'MECH', emoji:'🔧', color:'#5a4a3a', bg:'#f0ebe0',
    sys:'你是根莖葉植物工作室的機械工程師。專注硬體設計、自動化機構、ArUco marker、攝影裝置與感測器整合。繁體中文，語氣精確務實。150字內。' },
  { id:'botanist', role:'植物學家', tag:'BOT', emoji:'🌿', color:'#2a5e3a', bg:'#daf0e4',
    sys:'你是根莖葉植物工作室的植物學家，專攻鹿角蕨（Platycerium）。關注生長條件、健康指標、栽培技術與品種特性。繁體中文，語氣嚴謹科學。150字內。' },
  { id:'elec', role:'電機工程師', tag:'EE', emoji:'⚡', color:'#3a3a8a', bg:'#e4e4f8',
    sys:'你是根莖葉植物工作室的電機工程師。專注電路設計、感測器（溫濕度、重量）、嵌入式系統與自動化控制。繁體中文，語氣技術導向。150字內。' },
];

const CTX = '根莖葉（Gốc Thân Lá）是位於越南的植物工作室，專注鹿角蕨（staghorn fern）及特殊植物品種銷售。老闆 Chandler Wei，員工有 Quang 和小幫手。多地點銷售，自建 POS 系統、植物生長追蹤系統（S System）、決策參謀室（三一學院）。';

let running = false, sNum = 0, pastMemory = [];

// Render members
const bar = document.getElementById('membersBar');
MEMBERS.forEach(m => {
  bar.innerHTML += `<div class="chip" id="c-${m.id}"><span>${m.emoji}</span><div class="dot" style="background:${m.color}"></div><span class="rl" style="color:${m.color}">${m.role}</span></div>`;
});

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='board')||(i===1&&tab==='issues')));
  document.getElementById('panel-board').classList.toggle('active', tab==='board');
  document.getElementById('panel-issues').classList.toggle('active', tab==='issues');
  if (tab==='issues') loadIssues();
}

function speak(id) {
  MEMBERS.forEach(m => document.getElementById('c-'+m.id)?.classList.remove('on'));
  if (id) document.getElementById('c-'+id)?.classList.add('on');
}
function setStatus(t) { document.getElementById('status').textContent = t; }

function addEl(html) {
  const feed = document.getElementById('feed');
  document.getElementById('emptyState')?.remove();
  feed.insertAdjacentHTML('beforeend', html);
  feed.scrollTop = feed.scrollHeight;
}

async function supaFetch(path, opts={}) {
  return fetch(SUPA_URL + path, {
    ...opts,
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer '+SUPA_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal', ...(opts.headers||{}) }
  });
}

async function loadMemory() {
  try {
    const res = await supaFetch('/rest/v1/board_memory?select=question,summary,created_at&order=created_at.desc&limit=5');
    const data = await res.json();
    pastMemory = data.reverse();
    const feed = document.getElementById('feed');
    document.getElementById('emptyState')?.remove();
    if (pastMemory.length > 0) {
      const items = pastMemory.map(m => `<div class="memory-item"><span>${new Date(m.created_at).toLocaleDateString('zh-TW')}</span>　${esc(m.question)}</div>`).join('');
      feed.insertAdjacentHTML('beforeend', `<div class="memory-card"><div class="memory-label">📚 過去 ${pastMemory.length} 次討論記錄</div>${items}</div>`);
      document.getElementById('memoryBadge').textContent = `記憶：${pastMemory.length} 次`;
    } else {
      feed.insertAdjacentHTML('beforeend', '<div class="empty"><div>🌿</div><div>提出商業問題，學院開始討論</div></div>');
      document.getElementById('memoryBadge').textContent = '無過去記錄';
    }
  } catch(e) {
    document.getElementById('memoryBadge').textContent = '記憶載入失敗';
  }
  document.getElementById('qInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  setStatus('');
}

function addTyping(m) {
  addEl(`<div class="msg-row" id="typing"><div class="avatar" style="background:${m.bg};border-color:${m.color};color:${m.color}">${m.emoji}</div><div class="msg-body"><div class="msg-head"><span class="msg-role" style="color:${m.color}">${m.role}</span><span class="msg-tag">${m.tag}</span></div><div class="dots"><span></span><span></span><span></span></div></div></div>`);
}
function replaceTyping(text) {
  const el = document.getElementById('typing');
  if (el) { el.removeAttribute('id'); el.querySelector('.dots').outerHTML = `<div class="msg-text">${text}</div>`; }
}

async function api(sys, prompt) {
  const r = await fetch('/api/chat', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, system:sys, messages:[{role:'user',content:prompt}] })
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error?.message || 'error');
  return d.content[0].text;
}

async function go() {
  if (running) return;
  const ta = document.getElementById('qInput');
  const q = ta.value.trim();
  if (!q) return;
  running = true; ta.disabled = true; document.getElementById('sendBtn').disabled = true; ta.value = '';
  sNum++;
  document.getElementById('sessionBadge').textContent = `SESSION #${sNum}`;
  addEl(`<div class="divider"><span>第 ${sNum} 次會議</span></div>`);
  addEl(`<div class="q-row"><div class="q-bubble">${esc(q)}</div></div>`);

  const longTermCtx = pastMemory.length > 0
    ? '\n\n【過去討論記錄】\n' + pastMemory.slice(-3).map(m=>`問題：${m.question}\n結論：${m.summary}`).join('\n\n')
    : '';

  const roundReplies = [];
  for (const m of MEMBERS) {
    speak(m.id);
    setStatus(`${m.role} 正在思考...`);
    addTyping(m);
    const prev = roundReplies.length ? '\n\n本次其他成員發言：\n'+roundReplies.map(x=>`${x.role}：${x.t}`).join('\n\n') : '';
    const prompt = `${CTX}${longTermCtx}\n\n本次討論題目：${q}${prev}\n\n請以你的角色立場發表意見。`;
    try {
      const reply = await api(m.sys, prompt);
      replaceTyping(esc(reply).replace(/\n/g,'<br>'));
      roundReplies.push({ role: m.role, t: reply });
    } catch(e) {
      replaceTyping(`⚠️ ${esc(e.message)}`);
    }
    await new Promise(r=>setTimeout(r,200));
  }

  setStatus('整合共識中...');
  let summaryText = '';
  try {
    summaryText = await api('你是執行長，整合學院討論，用繁體中文條列3-5個具體行動項目。簡潔。',
      `題目：${q}\n\n討論：\n${roundReplies.map(x=>`${x.role}：${x.t}`).join('\n\n')}\n\n行動建議：`);
    addEl(`<div class="summary"><div class="summary-label">📋 學院共識與行動建議</div><div class="summary-text">${esc(summaryText)}</div></div>`);
  } catch(e) {}

  if (summaryText) {
    await supaFetch('/rest/v1/board_memory', { method:'POST', body: JSON.stringify({ question:q, summary:summaryText }) });
    pastMemory.push({ question:q, summary:summaryText, created_at: new Date().toISOString() });
    document.getElementById('memoryBadge').textContent = `記憶：${pastMemory.length} 次`;
  }

  speak(null);
  setStatus(`第 ${sNum} 次會議結束 · 已儲存 · 可繼續提問`);
  running = false; ta.disabled = false; document.getElementById('sendBtn').disabled = false; ta.focus();
}

// Issues
async function loadIssues() {
  try {
    const res = await supaFetch('/rest/v1/issues?select=*&order=created_at.desc');
    const data = await res.json();
    renderIssues(data);
  } catch(e) {
    document.getElementById('issuesList').innerHTML = '<p style="font-family:monospace;font-size:.7rem;color:#999">載入失敗</p>';
  }
}

function renderIssues(issues) {
  const el = document.getElementById('issuesList');
  if (!issues.length) {
    el.innerHTML = '<div class="empty" style="padding:40px 0"><div>📋</div><div>尚無議題，新增第一筆</div></div>';
    return;
  }
  el.innerHTML = issues.map(i => `
    <div class="issue-card">
      <div class="issue-header">
        <div class="issue-title">${esc(i.title)}</div>
        <div class="issue-badges">
          <span class="badge badge-priority-${i.priority}">${i.priority}</span>
          <span class="badge badge-progress">${i.progress}</span>
          ${i.related_system ? `<span class="badge badge-system">${esc(i.related_system)}</span>` : ''}
          <span class="badge badge-progress">${esc(i.category)}</span>
        </div>
      </div>
      ${i.description ? `<div class="issue-desc">${esc(i.description)}</div>` : ''}
      ${i.solution ? `<div class="issue-solution">💡 ${esc(i.solution)}</div>` : ''}
      <div class="issue-footer">
        <div class="issue-date">${new Date(i.created_at).toLocaleDateString('zh-TW')}</div>
        <div class="issue-actions">
          <button class="btn-sm" onclick="updateProgress(${i.id},'討論中')">討論中</button>
          <button class="btn-sm" onclick="updateProgress(${i.id},'進行中')">進行中</button>
          <button class="btn-sm done" onclick="updateProgress(${i.id},'完成')">✓ 完成</button>
        </div>
      </div>
    </div>`).join('');
}

async function updateProgress(id, progress) {
  await supaFetch(`/rest/v1/issues?id=eq.${id}`, {
    method: 'PATCH',
    headers: { 'Prefer': 'return=minimal' },
    body: JSON.stringify({ progress, updated_at: new Date().toISOString() })
  });
  loadIssues();
}

function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  ['f-title','f-desc','f-solution'].forEach(id => document.getElementById(id).value = '');
}

async function saveIssue() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('請填寫議題標題'); return; }
  const payload = {
    title,
    category: document.getElementById('f-category').value,
    priority: document.getElementById('f-priority').value,
    progress: document.getElementById('f-progress').value,
    related_system: document.getElementById('f-system').value || null,
    description: document.getElementById('f-desc').value.trim() || null,
    solution: document.getElementById('f-solution').value.trim() || null,
  };
  await supaFetch('/rest/v1/issues', { method:'POST', body: JSON.stringify(payload) });
  closeModal();
  loadIssues();
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
document.getElementById('qInput').addEventListener('keydown', e => { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();go();} });
document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

loadMemory();
</script>
